<body>
  <script>
    (function () {
      if (window.location.pathname !== '/oauth-callback') return;
      var hash = window.location.hash || '';
      if (hash.indexOf('id_token=') !== -1) {
        sessionStorage.setItem('tsureben_oauth_hash', hash);
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
